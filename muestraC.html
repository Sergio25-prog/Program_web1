
<section id="registro-usuarios">
    <h2>Registro de Nuevos Clientes</h2>
    <form action="/registrar" method="POST">
        <fieldset>
            <legend>Datos Personales y de Contacto</legend>

            <label for="nombre">Nombres y Apellidos:</label>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>

            <label for="tipo_doc">Tipo de Documento:</label>
            <select id="tipo_doc" name="tipo_doc" required>
                <option value="">Seleccione una opción...</option>
                <option value="DNI">DNI</option>
                <option value="RUT">RUT</option>
                <option value="Cedula">Cédula</option>
                <option value="Pasaporte">Pasaporte</option>
            </select>
            <br><br>

            <label for="num_doc">Número de Documento:</label>
            <input type="text" id="num_doc" name="num_doc" required>
            <br><br>

            <label for="fecha_nac">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nac" name="fecha_nac" required>
            <br><br>

            <label>Sexo:</label>
            <input type="radio" id="sexo_m" name="sexo" value="Masculino" required>
            <label for="sexo_m">Masculino</label>
            <input type="radio" id="sexo_f" name="sexo" value="Femenino" required>
            <label for="sexo_f">Femenino</label>
            <br><br>

            <label for="correo">Correo Electrónico:</label>
            <input type="email" id="correo" name="correo" placeholder="usuario@ejemplo.com" required>
            <br><br>

            <label for="telefono">Teléfono Móvil:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
            <br><br>

            <label for="comentarios">Comentarios:</label><br>
            <textarea id="comentarios" name="comentarios" rows="4" cols="50" placeholder="¿Cómo nos conoció? o requerimientos especiales..."></textarea>
            <br><br>

            <button type="submit">Registrar Usuario</button>
            <button type="reset">Limpiar Formulario</button>
        </fieldset>
    </form>
</section>
