<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso y Registro - Tienda de Tecnología</title>
    <style>
        /* 1. Selector de Etiqueta (Tipo) */
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333333;
        }

        /* 2. Selector de Clase */
        .form-contenedor {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 3. Selector de Identificador (ID) */
        #registro-form {
            border-top: 4px solid #0056b3;
        }

        #login-form {
            border-top: 4px solid #28a745;
        }

        /* 4. Selector de Atributo */
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box; /* Previene desbordamientos */
        }

        input[type="submit"] {
            background-color: #0056b3;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        
        input[type="submit"]:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <div class="form-contenedor" id="login-form"></div>
    <h2>Acceso de usuarios</h2>

    <form action="/login" method="POST">
        <fieldset>
            <legend>Ingrese sus credenciales</legend>
            
            <label for="usuario">Nombre de Usuario:</label>
            <input type="text" id="usuario" name="usuario" placeholder="Ej: admin_tech" required>
            <br><br>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="********" required>
            <br><br>
            
            <button type="submit">Enviar</button>
        </fieldset>
    </form>
    </div>
    <br> <div class="form-contenedor" id="registro-form">
    <h2>Registro de Nuevos Usuarios</h2>
    <form action="/registrar" method="POST">
        <fieldset>
            <legend>Datos Personales y de Contacto</legend>

            <label for="nombre">Nombres y Apellidos:</label>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>

            <label for="tipo_doc">Tipo de Documento:</label>
            <select id="tipo_doc" name="tipo_doc" required>
                <option value="">Seleccione una opción...</option>
                <option value="DNI">DNI</option>
                <option value="RUT">RUT</option>
                <option value="Cedula">Cédula</option>
                <option value="Pasaporte">Pasaporte</option>
            </select>
            <br><br>

            <label for="num_doc">Número de Documento:</label>
            <input type="text" id="num_doc" name="num_doc" required>
            <br><br>

            <label for="fecha_nac">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nac" name="fecha_nac" required>
            <br><br>

            <label>Sexo:</label>
            <input type="radio" id="sexo_m" name="sexo" value="Masculino" required>
            <label for="sexo_m">Masculino</label>
            <input type="radio" id="sexo_f" name="sexo" value="Femenino" required>
            <label for="sexo_f">Femenino</label>
            <br><br>

            <label for="correo">Correo Electrónico:</label>
            <input type="email" id="correo" name="correo" placeholder="usuario@ejemplo.com" required>
            <br><br>

            <label for="telefono">Teléfono Móvil:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
            <br><br>

            <label for="comentarios">Comentarios:</label><br>
            <textarea id="comentarios" name="comentarios" rows="4" cols="50" placeholder="¿Cómo nos conoció? o requerimientos especiales..."></textarea>
            <br><br>

            <button type="submit">Registrar Usuario</button>
            <button type="reset">Limpiar Formulario</button>
        </fieldset>
    </form>
    </div>
