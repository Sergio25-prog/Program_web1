<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Tecnológica - Plataforma Web</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        main {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        section {
            margin-bottom: 40px;
        }
        fieldset {
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            padding: 20px;
        }
        legend {
            font-weight: bold;
            color: #2980b9;
        }
        label {
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }
        input[type="text"], input[type="password"], input[type="date"], input[type="email"], input[type="tel"], select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Asegura que el padding no desborde el contenedor */
        }
        input[type="radio"] {
            margin-left: 10px;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        button[type="reset"] {
            background-color: #7f8c8d;
        }
        button:hover {
            background-color: #2980b9;
        }
        .video-container {
            text-align: center;
        }
    </style>
</head>
<body>

    <main>
        <header>
            <h1>Portal de la Tienda de Tecnología</h1>
            <p style="text-align: center;">Innovación y servicio al alcance de tu mano.</p>
        </header>

        <section id="acceso-usuarios">
            <h2>Acceso a la Plataforma</h2>
            <form action="#" method="POST">
                <fieldset>
                    <legend>Ingrese sus credenciales</legend>
                    
                    <label for="usuario">Nombre de Usuario:</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ej: admin_tech" required>
                    
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="********" required>
                    
                    <button type="submit">Iniciar Sesión</button>
                </fieldset>
            </form>
        </section>

        <section id="registro-usuarios">
            <h2>Registro de Nuevos Clientes</h2>
            <form action="#" method="POST">
                <fieldset>
                    <legend>Datos Personales y de Contacto</legend>

                    <label for="nombre">Nombres y Apellidos:</label>
                    <input type="text" id="nombre" name="nombre" required>

                    <label for="tipo_doc">Tipo de Documento:</label>
                    <select id="tipo_doc" name="tipo_doc" required>
                        <option value="">Seleccione una opción...</option>
                        <option value="DNI">DNI</option>
                        <option value="RUT">RUT</option>
                        <option value="Cedula">Cédula</option>
                        <option value="Pasaporte">Pasaporte</option>
                    </select>

                    <label for="num_doc">Número de Documento:</label>
                    <input type="text" id="num_doc" name="num_doc" required>

                    <label for="fecha_nac">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha_nac" name="fecha_nac" required>

                    <div style="margin-top: 10px;">
                        <label style="display: inline; margin-top: 0;">Sexo:</label>
                        <input type="radio" id="sexo_m" name="sexo" value="Masculino" required>
                        <label for="sexo_m" style="display: inline; font-weight: normal;">Masculino</label>
                        <input type="radio" id="sexo_f" name="sexo" value="Femenino" required>
                        <label for="sexo_f" style="display: inline; font-weight: normal;">Femenino</label>
                    </div>

                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="usuario@ejemplo.com" required>

                    <label for="telefono">Teléfono Móvil:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>

                    <label for="comentarios">Comentarios:</label>
                    <textarea id="comentarios" name="comentarios" rows="4" placeholder="¿Cómo nos conoció? o requerimientos especiales..."></textarea>

                    <button type="submit">Registrar Usuario</button>
                    <button type="reset">Limpiar Formulario</button>
                </fieldset>
            </form>
        </section>

        <section id="videos-relacionados" class="video-container">
            <h2>Videos Relacionados</h2>
            <p>Descubre el rendimiento de nuestros equipos en acción:</p>
            <iframe width="100%" height="400" 
                    src="https://www.youtube.com/embed/jZzBqM8y8B4" 
                    title="Review de Producto Tecnológico" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </section>

    </main>

</body>
</html>
